name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "accuracy=$ACC"

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          key = "models/latest/model.pkl"
          boto3.client("s3").upload_file("models/model.pkl", bucket, key)
          print(f"Uploaded models/model.pkl to s3://{bucket}/{key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed."
            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
